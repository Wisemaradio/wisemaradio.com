<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wisema Radio</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0b3c7a, #001f3f);
    color: white;
    text-align: center;
}

/* HEADER */
.header {
    padding: 30px 20px;
}

.header img {
    width: 180px;
}

/* SECCIÓN */
.section {
    margin-top: 30px;
}

.card {
    background: rgba(0,0,0,0.6);
    padding: 20px;
    border-radius: 20px;
    width: 300px;
    margin: auto;
    backdrop-filter: blur(10px);
}

/* LOGO EMISORA */
.station-logo {
    width: 120px;
    height: 120px;
    object-fit: contain;
    border-radius: 15px;
    margin-bottom: 10px;
}

/* BOTÓN */
.btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 25px;
    background: #1db954;
    color: white;
    font-size: 14px;
    cursor: pointer;
}

/* REPRODUCTOR GLOBAL */
.player {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #000;
    padding: 10px;
}

</style>
</head>

<body>

<!-- 🔥 LOGO PRINCIPAL -->
<div class="header">
    <img src="logo.png">
    <h2>Soluciones de Streaming Digital</h2>
</div>

<!-- 🔥 EMISORAS -->
<div class="section">
    <h2>Nuestras Emisoras</h2>

    <div class="card">
        <img src="variadisima.png" class="station-logo">

        <h3>Variadisima Stereo</h3>

        <button class="btn" onclick="playRadio(
            'https://variadisima.wisemaradio.com/listen/variadisima/radio.mp3',
            'Variadisima Stereo',
            'variadisima.png'
        )">
            ▶ Escuchar
        </button>
    </div>

</div>

<!-- 🔥 REPRODUCTOR GLOBAL -->
<div class="player" id="player" style="display:none;">
    <strong id="radioName"></strong><br>
    <img id="radioLogo" style="width:50px;margin:5px;">
    <br>
    <audio id="audio" controls autoplay></audio>
</div>

<script>

let audio = document.getElementById("audio");

function playRadio(url, name, logo) {

    audio.src = url;
    audio.play();

    document.getElementById("radioName").innerText = name;
    document.getElementById("radioLogo").src = logo;

    document.getElementById("player").style.display = "block";
}

</script>

</body>
</html>
