<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wisema Radio</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0b3c7a, #001f3f);
    color: white;
    text-align: center;
}

/* HEADER */
.header {
    padding: 30px 20px;
}

.header img {
    width: 180px;
}

/* SECCIÓN */
.section {
    margin-top: 30px;
}

.cards {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
}

/* TARJETAS */
.card {
    background: rgba(0,0,0,0.6);
    padding: 20px;
    border-radius: 20px;
    width: 250px;
    backdrop-filter: blur(10px);
}

/* LOGO EMISORA */
.station-logo {
    width: 100px;
    height: 100px;
    object-fit: contain;
    border-radius: 15px;
    margin-bottom: 10px;
}

/* BOTÓN */
.btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 25px;
    background: #1db954;
    color: white;
    font-size: 14px;
    cursor: pointer;
}

.btn:hover {
    background: #17a74a;
}
</style>
</head>

<body>

<!-- 🔥 LOGO PRINCIPAL -->
<div class="header">
    <img src="logo.png">
    <h2>Soluciones de Streaming Digital</h2>
</div>

<!-- 🔥 EMISORAS -->
<div class="section">
    <h2>Nuestras Emisoras</h2>

    <div class="cards">

        <!-- 🔥 EMISORA 1 -->
        <div class="card">
            <img src="variadisima.png" class="station-logo">
            <h3>Variadisima Stereo</h3>

            <button class="btn" onclick="toggleRadio('variadisima')">
                ▶ Escuchar
            </button>
        </div>

        <!-- 🔥 EMISORA 2 (EJEMPLO) -->
        <div class="card">
            <img src="logo.png" class="station-logo">
            <h3>Próxima Emisora</h3>

            <button class="btn" onclick="toggleRadio('otra')">
                ▶ Escuchar
            </button>
        </div>

    </div>
</div>

<!-- 🎧 AUDIO OCULTO -->
<audio id="radio"></audio>

<script>

let radio = document.getElementById("radio");
let actual = "";

// 🔥 PLAY / CAMBIO DE EMISORA
function toggleRadio(nombre) {

    let url = "";

    if (nombre === "variadisima") {
        url = "https://variadisima.wisemaradio.com/listen/variadisima/radio.mp3";
    }

    if (nombre === "otra") {
        url = "https://otra.wisemaradio.com/listen/otra/radio.mp3";
    }

    // Si cambia de emisora
    if (actual !== nombre) {
        radio.src = url;
        radio.play();
        actual = nombre;
    } else {
        // Toggle play/pausa
        if (radio.paused) {
            radio.play();
        } else {
            radio.pause();
        }
    }
}

</script>

</body>
</html>
